<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div>
        <img src="assets/icon.png" alt="roblox icon" />
        <h1>FREE ROBUX</h1>
      </div>
      <button id="closeBtn">
        <img src="assets/close.png" alt="cross icon" />
      </button>
    </header>

    <main>
      <div class="buy_robux">
        <button class="prank-btn">
          <img src="assets/robux.png" alt="robux icon" />
          100
        </button>
        <div>
          <h3 class="past_price">$0.99</h3>
          <h2 class="current_price">$0</h2>
        </div>
      </div>
      <div class="buy_robux">
        <button class="prank-btn">
          <img src="assets/robux.png" alt="robux icon" />
          1,000
        </button>
        <div>
          <h3 class="past_price">$3.99</h3>
          <h2 class="current_price">$0</h2>
        </div>
      </div>
      <div class="buy_robux">
        <button class="prank-btn">
          <img src="assets/robux.png" alt="robux icon" />
          10,00
        </button>
        <div>
          <h3 class="past_price">$45.99</h3>
          <h2 class="current_price">$0</h2>
        </div>
      </div>
      <div class="buy_robux">
        <button class="prank-btn">
          <img src="assets/robux.png" alt="robux icon" />
          100,000
        </button>
        <div>
          <h3 class="past_price">$278.99</h3>
          <h2 class="current_price">$0</h2>
        </div>
      </div>
      <div class="buy_robux">
        <button class="prank-btn">
          <img src="assets/robux.png" alt="robux icon" />
          1,000,000
        </button>
        <div>
          <h3 class="past_price">$3482.99</h3>
          <h2 class="current_price">$0</h2>
        </div>
      </div>
    </main>

    <footer>
      <p>
        When you buy Robux you receive only a limited, non-refundable,
        non-transferable, revocable license to use Robux, which has no value in
        real currency.
      </p>
    </footer>

    <script>
      const { ipcRenderer } = require("electron");

      document.getElementById("closeBtn").addEventListener("click", () => {
        ipcRenderer.send("close-window");
      });

      document.querySelectorAll(".prank-btn").forEach((button) => {
        button.addEventListener("click", () => {
          ipcRenderer.send("trigger-prank");
        });
      });
    </script>
  </body>
</html>
